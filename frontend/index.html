<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PROJECT_NAME}}</title>
    <style>
      body { font-family: system-ui, sans-serif; display: grid; place-items: center; min-height: 100vh; margin: 0; background: #0f1115; color: #e6e6e6; }
      main { text-align: center; }
      code { background: #1c2028; padding: 0.15em 0.4em; border-radius: 4px; }
      #health[data-ok="true"] { color: #4ade80; }
      #health[data-ok="false"] { color: #f87171; }
    </style>
  </head>
  <body>
    <main>
      <h1>{{PROJECT_NAME}}</h1>
      <p>Vite frontend is up. Backend health: <span id="health">checking…</span></p>
      <p><small>Template placeholder — replace with your app. Started via <code>./start.sh dev --ui</code>.</small></p>
    </main>
    <script type="module">
      const el = document.getElementById('health');
      try {
        // Template default: backend on :8000 (see start.sh DEFAULT_PORT).
        const r = await fetch('http://localhost:8000/health');
        const d = await r.json();
        el.textContent = `${d.status} (build ${d.build_stamp})`;
        el.dataset.ok = 'true';
      } catch {
        el.textContent = 'backend down';
        el.dataset.ok = 'false';
      }
    </script>
  </body>
</html>

# CI — synaptix-scaffold
#
# The `agents` job works out of the box: it verifies the agent layer is consistent (no adapter
# drift). The backend / frontend / shared jobs are CUSTOMIZATION POINTS — they are gated off until
# you fill in your stack. Set the repo variable ENABLE_STACK_CI = "true" (Settings → Actions →
# Variables) once your backend/frontend actually build, and replace the {{PLACEHOLDER}} commands.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ========================
  # Agent layer — always on. Verifies canonical brain + thin adapters are consistent.
  # ========================
  agents:
    name: Agent adapter consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check adapters (personas → real classes, pointers resolve, no pasted bodies)
        run: python3 scripts/check_adapters.py
      - name: Self-test the guard (negative fixtures — proves it fails on drift)
        run: python3 scripts/check_adapters_selftest.py

  # ========================
  # Backend tests — CUSTOMIZE: enable via repo variable ENABLE_STACK_CI once your stack is real.
  # ========================
  backend:
    name: Backend tests
    if: vars.ENABLE_STACK_CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"   # CUSTOMIZE
      - name: Install dependencies
        run: |
          cd backend
          pip install poetry && poetry install --with dev
      - name: Lint
        run: cd backend && poetry run ruff check .   # CUSTOMIZE
      - name: Run tests
        run: cd backend && poetry run pytest --cov=. --cov-report=xml
      - name: Check coverage
        run: cd backend && poetry run coverage report --fail-under=90

  # ========================
  # Frontend tests (incl. real-Chromium Playwright E2E) — CUSTOMIZE.
  # ========================
  frontend:
    name: Frontend tests
    if: vars.ENABLE_STACK_CI == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # CUSTOMIZE
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Run unit tests
        run: cd frontend && npm run test:unit
      - name: Install Playwright Chromium
        run: cd frontend && npx playwright install --with-deps chromium
      - name: Run E2E tests (real Chromium — page.goto, not request.get)
        run: cd frontend && npm run test:e2e
      - name: Upload E2E evidence (screenshots + Playwright report)
        if: always()   # keep the evidence even when the E2E step fails
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidence
          path: |
            tests/screenshots/
            frontend/playwright-report/
          if-no-files-found: ignore
